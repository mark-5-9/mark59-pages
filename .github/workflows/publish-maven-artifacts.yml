name: Publish Maven Artifacts to GitHub Pages

# Publishes mark59-core, mark59-scripting, and mark59-datahunter-api to the
# 'mvn-repo' branch, which is served publicly via GitHub Pages at:
# https://mark-5-9.github.io/mark59-pages
#
# Consumers add this to their pom.xml:
#
#   <repositories>
#     <repository>
#       <id>mark59-pages</id>
#       <url>https://mark-5-9.github.io/mark59-pages</url>
#     </repository>
#   </repositories>

on:
  # Trigger manually from the GitHub Actions UI (any collaborator with write access can run this)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — build and stage only, do not publish to mvn-repo branch'
        type: boolean
        default: false

  # Auto-trigger on version tags (e.g. git tag v6.6 && git push --tags)
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # Required to push to the mvn-repo branch

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Install all three modules (and their inter-dependencies) to the local
      # Maven cache so that the deploy phase can resolve them offline.
      - name: Install modules to local cache
        run: |
          mvn install \
            --batch-mode \
            --no-transfer-progress \
            -DskipTests \
            -pl mark59-core,mark59-datahunter-api,mark59-scripting \
            -am

      # Deploy only the three publishable modules to a local staging directory
      # using the standard Maven repository layout.
      - name: Stage artifacts for deployment
        run: |
          mvn deploy \
            --batch-mode \
            --no-transfer-progress \
            -DskipTests \
            -DaltDeploymentRepository="local-repo::default::file://${{ github.workspace }}/mvn-staging" \
            -pl mark59-core,mark59-datahunter-api,mark59-scripting

      # Prevent GitHub Pages' Jekyll processor from ignoring files/folders
      # whose names begin with an underscore (Maven metadata uses none, but
      # this is standard practice for any Pages-hosted static site).
      - name: Add .nojekyll marker
        run: touch mvn-staging/.nojekyll

      # Add a root index page so https://mark-5-9.github.io/mark59-pages/
      # returns a 200 with useful information rather than a 404.
      - name: Add root index page
        run: |
          cat > mvn-staging/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>mark59 Maven Repository</title>
            <style>
              body { font-family: sans-serif; max-width: 760px; margin: 40px auto; padding: 0 20px; }
              code, pre { background: #f4f4f4; padding: 2px 6px; border-radius: 4px; }
              pre { padding: 12px; overflow-x: auto; }
            </style>
          </head>
          <body>
            <h1>mark59 Maven Repository</h1>
            <p>This is the public Maven repository for the
               <a href="https://github.com/mark-5-9">mark59</a> project,
               served via GitHub Pages.</p>
            <p>Please see the <a href="https://mark59.com">mark59</a> website for further information about Mark59</p>

            <h2>Published artifacts</h2>
            <ul>
              <li><code>com.mark59 : mark59-core</code></li>
              <li><code>com.mark59 : mark59-datahunter-api</code></li>
              <li><code>com.mark59 : mark59-scripting</code></li>
            </ul>

            <h2>Usage</h2>
            <p>Add the following repository declaration to your <code>pom.xml</code>:</p>
            <pre>&lt;repositories&gt;
            &lt;repository&gt;
              &lt;id&gt;mark59-pages&lt;/id&gt;
              &lt;url&gt;https://mark-5-9.github.io/mark59-pages&lt;/url&gt;
            &lt;/repository&gt;
          &lt;/repositories&gt;</pre>

            <h2>Source</h2>
            <p>Artifacts are published from the
               <a href="https://github.com/mark-5-9/mark59-pages/tree/mvn-repo">mvn-repo branch</a>
               of this repository.</p>
            <p>Note that examining this branch is the easiest way to see what versions of artifacts have been published.
            GitHub Pages does not provide a convenient way to browse the repository contents (unlike Maven Central).</p>
          </body>
          </html>
          EOF

      # Push the staged files to the 'mvn-repo' branch.
      # clean: false ensures previously published versions are NOT deleted.
      - name: Deploy to mvn-repo branch (GitHub Pages)
        if: ${{ github.event_name == 'push' || !inputs.dry_run }}
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: mvn-repo
          folder: mvn-staging
          clean: false
          commit-message: "Publish artifacts [${{ github.ref_name }}]"
